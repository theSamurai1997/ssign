[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ssign"
version = "0.9.0"
description = "Secretion-system Identification for Gram-negative bacterial genomes"
readme = "README.md"
license = {text = "GPL-3.0-or-later"}
requires-python = ">=3.10"
authors = [
    {name = "M. Teo Reid", email = "teoreid@gmail.com"},
    {name = "Owen Terpstra", email = "owen.terpstra@rug.nl"},
    {name = "Karan Kumar", email = "karan.kumar@rwth-aachen.de"},
    {name = "Sonja Billerbeck", email = "s.billerbeck@imperial.ac.uk"},
]
maintainers = [
    {name = "Sonja Billerbeck", email = "s.billerbeck@imperial.ac.uk"},
    {name = "M. Teo Reid", email = "teoreid@gmail.com"},
]
keywords = [
    "bioinformatics",
    "secretion system",
    "gram-negative bacteria",
    "substrate prediction",
    "protein localization",
    "MacSyFinder",
    "DeepLocPro",
    "DeepSecE",
    "PLM-Effector",
    "SignalP",
    "bacterial genomics",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]

dependencies = [
    "streamlit>=1.30.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "biopython>=1.80",
    "matplotlib>=3.7",
    "seaborn>=0.13",
    "scipy>=1.10",
    "requests>=2.28",
    "pyyaml>=6.0",
    "macsyfinder>=2.1",
    "pybiolib",
    "pyrodigal>=3.5",
    "pyhmmer>=0.10",
    "jinja2>=3.0",
    "networkx>=3.0",
]

[project.optional-dependencies]
# Individual tool extras (pip install ssign[deepsece], etc.)
deepsece = [
    "deepsece",
    "fair-esm>=2.0",
    "torch>=2.0",
]
bakta = [
    "bakta>=1.5",
]
# Full: all optional Python dependencies
full = [
    "deepsece",
    "fair-esm>=2.0",
    "torch>=2.0",
    "bakta>=1.5",
    "goatools",
    "obonet",
]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[project.scripts]
ssign = "ssign_app.cli:main"
hmmsearch = "ssign_app.shims.hmmsearch:main"

[project.urls]
Homepage = "https://github.com/reidmat/ssign"
Documentation = "https://github.com/reidmat/ssign#readme"
Source = "https://github.com/reidmat/ssign"
Issues = "https://github.com/reidmat/ssign/issues"
Changelog = "https://github.com/reidmat/ssign/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ssign_app = ["assets/*", "scripts/*.py", "scripts/ssign_lib/*.py", "shims/*.py", ".streamlit/*"]
